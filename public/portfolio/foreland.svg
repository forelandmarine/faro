<svg width="1600" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0f2847"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a87c;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#c9a87c;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#1a3a6b;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect width="1600" height="1000" fill="url(#accent)"/>
  <!-- Abstract nav bar -->
  <rect x="80" y="40" width="120" height="8" rx="4" fill="#c9a87c" opacity="0.3"/>
  <rect x="1200" y="40" width="60" height="8" rx="4" fill="#ffffff" opacity="0.08"/>
  <rect x="1300" y="40" width="60" height="8" rx="4" fill="#ffffff" opacity="0.08"/>
  <rect x="1400" y="40" width="60" height="8" rx="4" fill="#ffffff" opacity="0.08"/>
  <!-- Hero text blocks -->
  <rect x="80" y="350" width="500" height="12" rx="2" fill="#ffffff" opacity="0.06"/>
  <rect x="80" y="390" width="700" height="48" rx="4" fill="#ffffff" opacity="0.12"/>
  <rect x="80" y="460" width="600" height="48" rx="4" fill="#ffffff" opacity="0.1"/>
  <rect x="80" y="540" width="400" height="10" rx="2" fill="#ffffff" opacity="0.05"/>
  <rect x="80" y="560" width="350" height="10" rx="2" fill="#ffffff" opacity="0.05"/>
  <rect x="80" y="620" width="140" height="40" rx="20" fill="#c9a87c" opacity="0.2"/>
  <!-- Right side abstract image area -->
  <rect x="900" y="200" width="600" height="600" rx="8" fill="#ffffff" opacity="0.03"/>
  <circle cx="1200" cy="500" r="150" fill="#1a3a6b" opacity="0.3"/>
</svg>
